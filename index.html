
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Konecranes Innovation — Idea Rain</title>

  <style>
    :root{
      --bg1:#07111f;
      --bg2:#0b1c33;
      --panel:rgba(10,16,26,.82);
      --text:#eaf2ff;
      --muted:#a9bbd6;
      --accent:#6ae4ff;
      --good:#ffd24a;
      --bad:#9aa6b2;
      --diamond:#6ff0ff;
      --danger:#ff5d6c;
      --ok:#7CFF92;
      --shadow: 0 18px 50px rgba(0,0,0,.45);
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background: radial-gradient(1200px 700px at 30% 20%, #122a4b 0%, var(--bg2) 35%, var(--bg1) 100%);
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      overflow:hidden;
      padding: 14px;
    }

    /* ✅ Smaller and always visible */
    .wrap{
      width: min(900px, 96vw);
      height: min(560px, 86vh);
      position:relative;
      border-radius:24px;
      overflow:hidden;
      box-shadow: var(--shadow);
      border:1px solid rgba(255,255,255,.08);
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
    }

    canvas{
      width:100%;
      height:100%;
      display:block;
      background:
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.0)),
        radial-gradient(800px 400px at 50% 10%, rgba(106,228,255,.12), transparent 60%);
    }

    .hud{
      position:absolute;
      inset:12px 12px auto 12px;
      display:flex;
      gap:10px;
      align-items:flex-start;
      justify-content:space-between;
      pointer-events:none;
      flex-wrap:wrap;
    }
    .hud .left, .hud .right{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
    }
    .pill{
      padding:9px 11px;
      border-radius:999px;
      background: var(--panel);
      border:1px solid rgba(255,255,255,.08);
      box-shadow: 0 10px 25px rgba(0,0,0,.22);
      display:flex;
      gap:10px;
      align-items:center;
      font-size:13px;
      color:var(--text);
      font-variant-numeric: tabular-nums;
    }
    .pill b{ font-weight:800; }

    .dot{
      width:10px; height:10px; border-radius:50%;
      background: var(--accent);
      box-shadow: 0 0 20px rgba(106,228,255,.35);
    }
    .dot.good{ background:var(--good); box-shadow:0 0 18px rgba(255,210,74,.35); }
    .dot.bad{ background:var(--bad); box-shadow:0 0 16px rgba(154,166,178,.25); }
    .dot.diamond{ background:var(--diamond); box-shadow:0 0 18px rgba(111,240,255,.35); }

    .timer.danger{
      color: var(--danger);
      text-shadow: 0 0 16px rgba(255,93,108,.25);
    }

    /* ✅ IMPORTANT: overlay scroll fix (no more clipped shop) */
    .overlay{
      position:absolute;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      background: radial-gradient(1000px 600px at 50% 15%, rgba(0,0,0,.25), rgba(0,0,0,.70));
      backdrop-filter: blur(4px);

      overflow:auto;
      -webkit-overflow-scrolling: touch;
    }
    .overlay.show{ display:flex; }

    /* ✅ panel never exceeds overlay height; scroll inside if needed */
    .panel{
      width:min(820px, 96%);
      border-radius:22px;
      background: rgba(10,16,26,.92);
      border:1px solid rgba(255,255,255,.10);
      box-shadow: 0 22px 60px rgba(0,0,0,.55);
      padding:16px;

      max-height: calc(100% - 36px);
      overflow:auto;
    }

    .panel header{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      margin-bottom:10px;
      flex-wrap:wrap;
    }
    .panel h2{
      margin:0;
      font-size:18px;
      letter-spacing:.2px;
    }
    .panel .sub{
      color:var(--muted);
      font-size:13px;
      margin-top:4px;
      line-height:1.35;
      max-width: 520px;
    }

    .grid{
      display:grid;
      grid-template-columns: 1.1fr .9fr;
      gap:12px;
      margin-top:12px;
    }
    @media (max-width: 820px){
      .grid{ grid-template-columns:1fr; }
    }
    .card{
      border-radius:18px;
      background: rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      padding:13px;
    }
    .card h3{
      margin:0 0 6px 0;
      font-size:14px;
    }
    .list{
      margin:0;
      padding-left:18px;
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }
    .shopRow{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      padding:12px;
      border-radius:16px;
      background: rgba(0,0,0,.18);
      border:1px solid rgba(255,255,255,.07);
      margin-top:10px;
    }
    .shopRow strong{ font-size:13.5px; display:block; }
    .shopRow .desc{ color:var(--muted); font-size:12.5px; margin-top:4px; line-height:1.35; }

    .btn{
      pointer-events:auto;
      cursor:pointer;
      border:0;
      border-radius:14px;
      padding:9px 11px;
      background: rgba(106,228,255,.18);
      color: var(--text);
      border:1px solid rgba(106,228,255,.35);
      transition: transform .06s ease, background .15s ease;
      font-weight:800;
      font-size:13px;
      min-width:120px;
      text-align:center;
      user-select:none;
    }
    .btn:hover{ background: rgba(106,228,255,.25); }
    .btn:active{ transform: translateY(1px) scale(.99); }
    .btn.secondary{
      background: rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
    }
    .btn:disabled{
      cursor:not-allowed;
      opacity:.55;
      filter:saturate(.7);
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border-radius:999px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      font-size:12px;
      color:var(--muted);
      font-variant-numeric: tabular-nums;
      margin-left:8px;
    }

    /* ✅ sticky footer actions so buttons never disappear */
    .footerActions{
      margin-top:12px;
      display:flex;
      gap:10px;
      justify-content:flex-end;
      flex-wrap:wrap;

      position: sticky;
      bottom: 0;
      padding: 12px 0 2px 0;
      background: rgba(10,16,26,.92);
      border-top: 1px solid rgba(255,255,255,.08);
    }

    .tiny{
      font-size:12px;
      color:var(--muted);
      line-height:1.4;
      margin-top:8px;
    }
  </style>
</head>

<audio id="bgMusic" loop>

</audio>

<script>

  <div class="wrap">
    <canvas id="c"></canvas>

    <div class="hud">
      <div class="left">
        <div class="pill">
          <span class="dot"></span>
          <span><b>Round</b> <span id="roundTxt">1</span>/5</span>
          <span class="badge">Wallet: <b id="walletTxt">0</b> coins</span>
        </div>
        <div class="pill">
          <span><span class="dot bad"></span> Bad: <b id="badTxt">0</b></span>
          <span><span class="dot good"></span> Good: <b id="goodTxt">0</b></span>
          <span><span class="dot diamond"></span> Diamond: <b id="diaTxt">0</b></span>
          <span class="badge">Missed: <b id="missedTxt">0</b></span>
        </div>
      </div>

      <div class="right">
        <div class="pill">
          <span>Year ends in</span>
          <b class="timer" id="timerTxt">30.0s</b>
        </div>
        <div class="pill">
          <span>Move:</span>
          <span style="color:var(--muted)">A/D or ←/→</span>
          <span style="margin-left:10px">Jump:</span>
          <span style="color:var(--muted)">W/Space/↑</span>
        </div>
      </div>
    </div>

    <div class="overlay" id="overlay">
      <div class="panel" id="panel"></div>
    </div>
  </div>

<script>
(() => {
  // ========= utils =========
  const clamp = (v,min,max)=>Math.max(min,Math.min(max,v));
  const rand = (a,b)=>a+Math.random()*(b-a);

  // ========= canvas =========
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  let W = 900, H = 560, DPR = 1;

  // ========= DOM =========
  const roundTxt = document.getElementById("roundTxt");
  const walletTxt = document.getElementById("walletTxt");
  const badTxt = document.getElementById("badTxt");
  const goodTxt = document.getElementById("goodTxt");
  const diaTxt = document.getElementById("diaTxt");
  const missedTxt = document.getElementById("missedTxt");
  const timerTxt = document.getElementById("timerTxt");
  const overlay = document.getElementById("overlay");
  const panel = document.getElementById("panel");

  // ========= game constants =========
  const GRAVITY = 2100;
  const MOVE_ACC = 3000;
  const MAX_SPEED = 480;
  const FRICTION = 2400;
  const JUMP_V = 820;
  const COYOTE = 0.09;
  const JUMP_BUFFER = 0.10;

  const ROUND_TIME = 30.0;
  const TOTAL_ROUNDS = 5;

  // ========= state =========
  const state = {
    round: 1,
    wallet: 0,
    totalIdeas: 0,
    totalCoinsEarned: 0,

    upgrades: {
      tppsIndia: false,
      focusThemes: false,
      patentor: false
    },

    playing: true,
    timeLeft: ROUND_TIME,

    collected: { bad:0, good:0, diamond:0 },
    missed: 0,

    // ✅ payout fix: store current year payout and apply only once
    yearEnd: {
      active: false,
      payoutApplied: false,
      payoutCoins: 0
    }
  };

  // ========= input =========
  const keys = new Set();
  let jumpBuffer = 0;

  window.addEventListener("keydown", (e) => {
    const k = e.key.toLowerCase();
    keys.add(k);
    if (k === " " || k === "w" || k === "arrowup") jumpBuffer = JUMP_BUFFER;
    if ([" ", "arrowup", "arrowdown", "arrowleft", "arrowright"].includes(k)) e.preventDefault();
  }, { passive:false });

  window.addEventListener("keyup", (e) => keys.delete(e.key.toLowerCase()));

  // ========= world & entities =========
  const player = {
    x: 80,
    y: 0,
    w: 34,
    h: 48,
    vx: 0,
    vy: 0,
    onGround: false,
    coyote: 0,
    facing: 1
  };

  let platforms = [];
  let ideas = [];
  let spawnAcc = 0;
  let t = 0;

  function groundY(){
    return H - 52;
  }

  // ========= resize =========
  function resize(){
    const rect = canvas.getBoundingClientRect();
    DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    canvas.width = Math.floor(rect.width * DPR);
    canvas.height = Math.floor(rect.height * DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);
    W = rect.width;
    H = rect.height;

    platforms = generatePlatforms(state.round);
  }
  window.addEventListener("resize", resize);

  // ========= platforms =========
  function generatePlatforms(round){
    const p = [];
    const gY = groundY();
    p.push({ x:0, y:gY, w:W, h:H-gY }); // ground

    const baseY = gY - 80;
    const drift = (round-1) * 6;

    p.push({ x: 60,  y: baseY - 0   - drift, w: 170, h: 18 });
    p.push({ x: 280, y: baseY - 70  - drift, w: 170, h: 18 });
    p.push({ x: 520, y: baseY - 35  - drift, w: 190, h: 18 });
    p.push({ x: 740, y: baseY - 110 - drift, w: 140, h: 18 });
    p.push({ x: W*0.38, y: gY - 210 - drift, w: 220, h: 18 });

    return p;
  }

  // ========= idea rain tuning =========
  function spawnConfig(){
    let rate = 5.2 + (state.round-1) * 0.9;  // intentionally high
    if (state.upgrades.tppsIndia) rate += 2.2;

    let badP = 0.62, goodP = 0.33, diaP = 0.05;

    if (state.upgrades.focusThemes){ goodP += 0.18; badP -= 0.18; }
    if (state.upgrades.patentor){ diaP += 0.08; badP -= 0.05; goodP -= 0.03; }

    badP = Math.max(0.08, badP);
    goodP = Math.max(0.10, goodP);
    diaP = Math.max(0.02, diaP);
    const sum = badP + goodP + diaP;
    badP/=sum; goodP/=sum; diaP/=sum;

    const fallMin = 240 + (state.round-1)*18;
    const fallMax = 420 + (state.round-1)*24;

    return { rate, badP, goodP, diaP, fallMin, fallMax };
  }

  function pickIdeaType(cfg){
    const r = Math.random();
    if (r < cfg.badP) return "bad";
    if (r < cfg.badP + cfg.goodP) return "good";
    return "diamond";
  }

  function spawnIdea(cfg){
    const type = pickIdeaType(cfg);
    const r = (type === "diamond") ? 16 : 14;

    ideas.push({
      x: rand(20, W-20),
      y: -rand(30, 120),
      vx: rand(-45, 45),
      vy: rand(cfg.fallMin, cfg.fallMax),
      r,
      type,
      phase: Math.random() * Math.PI * 2
    });
  }

  // ========= collisions =========
  function aabb(ax,ay,aw,ah, bx,by,bw,bh){
    return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
  }

  function resolvePlayer(dt){
    player.onGround = false;

    // X
    player.x += player.vx * dt;
    for (const pl of platforms){
      if (aabb(player.x, player.y, player.w, player.h, pl.x, pl.y, pl.w, pl.h)){
        if (player.vx > 0) player.x = pl.x - player.w;
        else if (player.vx < 0) player.x = pl.x + pl.w;
        player.vx = 0;
      }
    }

    // Y
    player.y += player.vy * dt;
    for (const pl of platforms){
      if (aabb(player.x, player.y, player.w, player.h, pl.x, pl.y, pl.w, pl.h)){
        if (player.vy > 0){
          player.y = pl.y - player.h;
          player.vy = 0;
          player.onGround = true;
          player.coyote = COYOTE;
        } else if (player.vy < 0){
          player.y = pl.y + pl.h;
          player.vy = 0;
        }
      }
    }

    player.x = clamp(player.x, 0, W - player.w);
    if (player.y > H + 160){
      player.x = 80;
      player.y = groundY() - player.h - 10;
      player.vx = 0;
      player.vy = 0;
      state.timeLeft = Math.max(0, state.timeLeft - 1.5);
    }
  }

  // ========= catching =========
  function checkCatch(){
    const px = player.x + player.w/2;
    const py = player.y + player.h/2;
    const catchR = Math.max(player.w, player.h) * 0.55;

    for (let i=ideas.length-1; i>=0; i--){
      const it = ideas[i];
      const dx = it.x - px, dy = it.y - py;
      const rr = it.r + catchR;
      if (dx*dx + dy*dy < rr*rr){
        state.collected[it.type]++;
        state.totalIdeas++;
        ideas.splice(i,1);
      }
    }
  }

  function coinsFromCollected(col){
    return col.bad * 1 + col.good * 3 + col.diamond * 10;
  }

  // ========= UI =========
  function updateHud(){
    roundTxt.textContent = state.round;
    walletTxt.textContent = state.wallet;
    badTxt.textContent = state.collected.bad;
    goodTxt.textContent = state.collected.good;
    diaTxt.textContent = state.collected.diamond;
    missedTxt.textContent = state.missed;

    timerTxt.textContent = `${state.timeLeft.toFixed(1)}s`;
    timerTxt.classList.toggle("danger", state.timeLeft <= 7);
  }

  // ========= shop overlay (BUG FIXED) =========
  function shopRowHTML(title, desc, cost, key){
    const owned = state.upgrades[key];
    const affordable = state.wallet >= cost;
    const disabled = owned || !affordable;
    const label = owned ? "Owned ✓" : (affordable ? `Buy (${cost})` : `Need ${cost}`);
    return `
      <div class="shopRow">
        <div>
          <strong>${title} ${owned ? '<span class="badge">Owned</span>' : ""}</strong>
          <div class="desc">${desc}</div>
        </div>
        <button class="btn ${owned ? "secondary" : ""}" id="buy_${key}" ${disabled ? "disabled" : ""}>${label}</button>
      </div>
    `;
  }

  function renderYearEndOverlay(){
    const earned = state.yearEnd.payoutCoins; // already computed
    panel.innerHTML = `
      <header>
        <div>
          <h2>Year End Review — Round ${state.round}/${TOTAL_ROUNDS}</h2>
          <div class="sub">
            Idea rain season is over. Coins are paid based on the quality you caught before ideas hit the ground.
          </div>
        </div>
        <div class="pill" style="pointer-events:none;">
          <span class="dot"></span>
          <span>Earned this year: <b style="color:var(--ok)">${earned}</b> coins</span>
        </div>
      </header>

      <div class="grid">
        <div class="card">
          <h3>Results</h3>
          <ul class="list">
            <li><b>Bad ideas</b>: ${state.collected.bad} × 1 coin</li>
            <li><b>Good ideas</b>: ${state.collected.good} × 3 coins</li>
            <li><b>Diamond ideas</b>: ${state.collected.diamond} × 10 coins</li>
            <li><b>Missed (hit the ground)</b>: ${state.missed}</li>
          </ul>
          <div class="tiny">
            Spawn rate is intentionally high — it’s designed so you can’t catch everything.
          </div>
        </div>

        <div class="card">
          <h3>Wallet & Totals</h3>
          <ul class="list">
            <li><b>Wallet now</b>: ${state.wallet} coins</li>
            <li><b>Total ideas gathered</b>: ${state.totalIdeas}</li>
            <li><b>Total coins earned</b>: ${state.totalCoinsEarned}</li>
          </ul>
        </div>
      </div>

      <div class="card" style="margin-top:12px;">
        <h3>Upgrade Shop</h3>

        ${shopRowHTML(
          "Set idea quantity TPPs to India",
          "Cost: 50 coins — Result: <b>more ideas rain</b> in the next rounds.",
          50,
          "tppsIndia"
        )}

        ${shopRowHTML(
          "Select innovation focus themes",
          "Cost: 50 coins — Result: <b>more good ideas</b> in the next rounds.",
          50,
          "focusThemes"
        )}

        ${shopRowHTML(
          "Hire an idea patentor",
          "Cost: 100 coins — Result: <b>more diamond ideas</b> in the next rounds.",
          100,
          "patentor"
        )}

        <div class="tiny">
          Upgrades are permanent for the remaining rounds.
        </div>
      </div>

      <div class="footerActions">
        <button class="btn secondary" id="btnReplay">Restart Game</button>
        <button class="btn" id="btnNext">${state.round < TOTAL_ROUNDS ? "Start Next Year →" : "Finish Game →"}</button>
      </div>
    `;

    // hook buy buttons
    for (const key of ["tppsIndia","focusThemes","patentor"]){
      const btn = document.getElementById(`buy_${key}`);
      if (btn) btn.addEventListener("click", ()=>buyUpgrade(key));
    }

    document.getElementById("btnReplay").addEventListener("click", restartGame);
    document.getElementById("btnNext").addEventListener("click", () => {
      if (state.round >= TOTAL_ROUNDS) showFinal();
      else {
        state.round++;
        resetRound();
      }
    });
  }

  function showYearEnd(){
    state.playing = false;
    state.yearEnd.active = true;

    // ✅ payout computed and applied ONCE
    if (!state.yearEnd.payoutApplied){
      const earned = coinsFromCollected(state.collected);
      state.yearEnd.payoutCoins = earned;

      state.wallet += earned;
      state.totalCoinsEarned += earned;

      state.yearEnd.payoutApplied = true;
    }

    renderYearEndOverlay();
    overlay.classList.add("show");
    updateHud();
  }

  function buyUpgrade(key){
    const costs = { tppsIndia:50, focusThemes:50, patentor:100 };
    const cost = costs[key] ?? 99999;
    if (state.upgrades[key]) return;
    if (state.wallet < cost) return;

    // ✅ buying only deducts coins and toggles flag (NO payouts here)
    state.wallet -= cost;
    state.upgrades[key] = true;

    // re-render overlay WITHOUT changing wallet payout
    renderYearEndOverlay();
    updateHud();
  }

  function showFinal(){
    state.playing = false;
    panel.innerHTML = `
      <header>
        <div>
          <h2>5 Years Completed — Innovation Program Summary</h2>
          <div class="sub">Final results of your innovation idea-catching sprint.</div>
        </div>
        <div class="pill" style="pointer-events:none;">
          <span class="dot"></span>
          <span>Final wallet: <b style="color:var(--accent)">${state.wallet}</b> coins</span>
        </div>
      </header>

      <div class="grid">
        <div class="card">
          <h3>Final Score</h3>
          <ul class="list">
            <li><b>Total ideas gathered</b>: ${state.totalIdeas}</li>
            <li><b>Total coins earned</b>: ${state.totalCoinsEarned}</li>
          </ul>
          <div class="tiny">Your core score is ideas gathered: <b>${state.totalIdeas}</b>.</div>
        </div>

        <div class="card">
          <h3>Upgrades Owned</h3>
          <ul class="list">
            <li>TPPs to India: <b>${state.upgrades.tppsIndia ? "Yes" : "No"}</b></li>
            <li>Focus themes: <b>${state.upgrades.focusThemes ? "Yes" : "No"}</b></li>
            <li>Idea patentor: <b>${state.upgrades.patentor ? "Yes" : "No"}</b></li>
          </ul>
        </div>
      </div>

      <div class="footerActions">
        <button class="btn secondary" id="btnReplay2">Restart</button>
      </div>
    `;
    overlay.classList.add("show");
    document.getElementById("btnReplay2").addEventListener("click", restartGame);
    updateHud();
  }

  function restartGame(){
    state.round = 1;
    state.wallet = 0;
    state.totalIdeas = 0;
    state.totalCoinsEarned = 0;
    state.upgrades = { tppsIndia:false, focusThemes:false, patentor:false };

    resetRound();
  }

  // ========= drawing =========
  function drawRoundedRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.arcTo(x+w, y, x+w, y+h, r);
    ctx.arcTo(x+w, y+h, x, y+h, r);
    ctx.arcTo(x, y+h, x, y, r);
    ctx.arcTo(x, y, x+w, y, r);
    ctx.closePath();
  }

  function drawBackground(){
    ctx.save();
    ctx.globalAlpha = 0.25;
    for (let i=0;i<46;i++){
      const x = (i*97 % 1200) % W;
      const y = (i*53 % 700) % H;
      ctx.fillStyle = "rgba(255,255,255,.65)";
      ctx.fillRect(x, y, 2, 2);
    }
    ctx.restore();

    ctx.save();
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, "rgba(106,228,255,.10)");
    g.addColorStop(0.4, "rgba(106,228,255,.04)");
    g.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);
    ctx.restore();
  }

  function drawPlatforms(){
    for (const pl of platforms){
      ctx.save();
      ctx.fillStyle = "rgba(255,255,255,.06)";
      ctx.strokeStyle = "rgba(106,228,255,.16)";
      ctx.lineWidth = 2;
      drawRoundedRect(pl.x, pl.y, pl.w, pl.h, 10);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = "rgba(106,228,255,.06)";
      drawRoundedRect(pl.x+4, pl.y+3, pl.w-8, Math.max(6, pl.h*0.4), 8);
      ctx.fill();
      ctx.restore();
    }

    ctx.save();
    ctx.strokeStyle = "rgba(255,255,255,.10)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, groundY());
    ctx.lineTo(W, groundY());
    ctx.stroke();
    ctx.restore();
  }

  // ✅ clear “light bulb” icon
  function drawBulb(x,y,scale,type,phase){
    let glow, glass;
    if (type === "bad"){
      glow = "rgba(154,166,178,.28)";
      glass = "rgba(154,166,178,.60)";
    } else if (type === "good"){
      glow = "rgba(255,210,74,.32)";
      glass = "rgba(255,210,74,.70)";
    } else {
      glow = "rgba(111,240,255,.35)";
      glass = "rgba(111,240,255,.78)";
    }

    const wobble = Math.sin(t*4 + phase) * 0.05;

    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(wobble);

    // glow
    ctx.globalAlpha = 0.60;
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(0, 0, 18*scale, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // bulb glass
    ctx.fillStyle = glass;
    ctx.strokeStyle = "rgba(255,255,255,.22)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(0, -2*scale, 11*scale, 14*scale, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.stroke();

    // highlight
    ctx.globalAlpha = 0.30;
    ctx.fillStyle = "rgba(255,255,255,.9)";
    ctx.beginPath();
    ctx.ellipse(-4*scale, -8*scale, 3*scale, 6*scale, 0.4, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // filament
    ctx.strokeStyle = "rgba(0,0,0,.30)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-5*scale, -1*scale);
    ctx.quadraticCurveTo(0, 5*scale, 5*scale, -1*scale);
    ctx.stroke();

    // base
    ctx.fillStyle = "rgba(0,0,0,.28)";
    drawRoundedRect(-8*scale, 12*scale, 16*scale, 8*scale, 3*scale);
    ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,.10)";
    ctx.stroke();

    // sparkle for diamond
    if (type === "diamond"){
      ctx.save();
      ctx.globalAlpha = 0.55;
      ctx.strokeStyle = "rgba(255,255,255,.45)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-18*scale, -18*scale); ctx.lineTo(-10*scale, -10*scale);
      ctx.moveTo(18*scale, -18*scale); ctx.lineTo(10*scale, -10*scale);
      ctx.moveTo(0, -24*scale); ctx.lineTo(0, -15*scale);
      ctx.stroke();
      ctx.restore();
    }

    ctx.restore();
  }

  function drawIdeas(){
    for (const it of ideas){
      drawBulb(it.x, it.y, it.type==="diamond" ? 1.12 : 1.05, it.type, it.phase);
    }
  }

  function drawPlayer(){
    const x = player.x, y = player.y;
    ctx.save();

    // shadow
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = "black";
    ctx.beginPath();
    ctx.ellipse(x+player.w/2, y+player.h+8, 18, 6, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // body
    const grad = ctx.createLinearGradient(x, y, x, y+player.h);
    grad.addColorStop(0, "rgba(106,228,255,.25)");
    grad.addColorStop(1, "rgba(255,255,255,.08)");
    ctx.fillStyle = grad;
    ctx.strokeStyle = "rgba(255,255,255,.14)";
    ctx.lineWidth = 2;
    drawRoundedRect(x, y, player.w, player.h, 10);
    ctx.fill();
    ctx.stroke();

    // visor
    ctx.fillStyle = "rgba(0,0,0,.22)";
    drawRoundedRect(x+6, y+8, player.w-12, 14, 7);
    ctx.fill();

    // badge
    ctx.fillStyle = "rgba(255,210,74,.55)";
    ctx.beginPath();
    ctx.arc(x + (player.facing>0 ? player.w-10 : 10), y+28, 4, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();
  }

  function drawFooter(){
    ctx.save();
    ctx.fillStyle = "rgba(255,255,255,.10)";
    ctx.font = "700 12px ui-sans-serif, system-ui";
    ctx.fillText("Idea Rain — catch bulbs before they hit the ground. (Designed to be impossible to catch all.)", 14, H-14);
    ctx.restore();
  }

  // ========= round reset =========
  function resetRound(){
    state.playing = true;
    state.timeLeft = ROUND_TIME;
    state.collected = { bad:0, good:0, diamond:0 };
    state.missed = 0;
    ideas = [];
    spawnAcc = 0;

    // reset year-end payout flags for new round
    state.yearEnd.active = false;
    state.yearEnd.payoutApplied = false;
    state.yearEnd.payoutCoins = 0;

    platforms = generatePlatforms(state.round);

    player.x = 80;
    player.y = groundY() - player.h - 10;
    player.vx = 0;
    player.vy = 0;
    player.onGround = false;
    player.coyote = 0;

    overlay.classList.remove("show");
    updateHud();
  }

  // ========= main loop =========
  let last = performance.now();

  function update(dt){
    if (!state.playing) return;

    t += dt;

    // timer
    state.timeLeft -= dt;
    if (state.timeLeft <= 0){
      state.timeLeft = 0;
      updateHud();
      showYearEnd();
      return;
    }

    // movement
    const left = keys.has("a") || keys.has("arrowleft");
    const right = keys.has("d") || keys.has("arrowright");

    if (left && !right){
      player.vx -= MOVE_ACC * dt;
      player.facing = -1;
    } else if (right && !left){
      player.vx += MOVE_ACC * dt;
      player.facing = 1;
    } else {
      if (player.vx > 0) player.vx = Math.max(0, player.vx - FRICTION * dt);
      if (player.vx < 0) player.vx = Math.min(0, player.vx + FRICTION * dt);
    }
    player.vx = clamp(player.vx, -MAX_SPEED, MAX_SPEED);

    // gravity
    player.vy += GRAVITY * dt;

    // coyote time
    if (player.onGround) player.coyote = COYOTE;
    else player.coyote = Math.max(0, player.coyote - dt);

    // jump buffer
    jumpBuffer = Math.max(0, jumpBuffer - dt);
    if (jumpBuffer > 0 && (player.onGround || player.coyote > 0)){
      player.vy = -JUMP_V;
      player.onGround = false;
      player.coyote = 0;
      jumpBuffer = 0;
    }

    resolvePlayer(dt);

    // idea rain
    const cfg = spawnConfig();
    spawnAcc += dt * cfg.rate;
    while (spawnAcc >= 1){
      spawnIdea(cfg);
      spawnAcc -= 1;
    }

    // update ideas
    const gY = groundY();
    for (let i=ideas.length-1; i>=0; i--){
      const it = ideas[i];
      const wind = Math.sin(t*1.5 + it.phase) * 22;

      it.x += (it.vx + wind) * dt;
      it.y += it.vy * dt;

      if (it.x < 10){ it.x = 10; it.vx *= -0.4; }
      if (it.x > W-10){ it.x = W-10; it.vx *= -0.4; }

      if (it.y > gY - it.r){
        state.missed++;
        ideas.splice(i,1);
      }
    }

    checkCatch();
    updateHud();
  }

  function render(){
    ctx.clearRect(0,0,W,H);
    drawBackground();
    drawPlatforms();
    drawIdeas();
    drawPlayer();
    drawFooter();
  }

  function loop(now){
    const dt = Math.min(0.033, (now - last)/1000);
    last = now;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }

  // ========= start =========
  resize();
  resetRound();
  requestAnimationFrame(loop);

})();
</script>
</body>
